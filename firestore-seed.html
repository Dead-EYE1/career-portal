<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firestore Question Seeder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0e17;
      color: #fffffe;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      max-width: 520px;
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
    }
    h1 {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #a78bfa, #2cb67d);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { color: #94a1b2; font-size: 0.85rem; margin-bottom: 24px; line-height: 1.6; }
    button {
      width: 100%;
      padding: 16px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #7f5af0, #6c3ce0);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 20px;
      transition: all 0.2s;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .log {
      text-align: left;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      line-height: 1.8;
      color: #94a1b2;
      min-height: 80px;
      white-space: pre-wrap;
    }
    .log .success { color: #2cb67d; }
    .log .error { color: #e45858; }
    .log .info { color: #a78bfa; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔥 Firestore Question Seeder</h1>
    <p>Click the button below to upload the quiz questions into your Firestore <strong>"questions"</strong> collection. Run this only once.</p>
    <button id="seed-btn">Upload Questions to Firestore</button>
    <div class="log" id="log"><span class="info">Ready to seed…</span></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAh1dbSY0lLbYAZSzfPPpTlru3OmeZ3p_E",
      authDomain: "newjobupdates-c234a.firebaseapp.com",
      projectId: "newjobupdates-c234a",
      storageBucket: "newjobupdates-c234a.firebasestorage.app",
      messagingSenderId: "275056131922",
      appId: "1:275056131922:web:2b44bb31cf42e3897c448b",
      measurementId: "G-GTE4WECN4D"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ── Questions to seed ─────────────────────────────
    const questions = [
      {
        questionText: "What is the capital of India?",
        options: ["Mumbai", "New Delhi", "Kolkata", "Chennai"],
        correctAnswer: 1,
        order: 1
      },
      {
        questionText: "Who wrote the Indian national anthem 'Jana Gana Mana'?",
        options: ["Bankim Chandra Chattopadhyay", "Rabindranath Tagore", "Sarojini Naidu", "Mahatma Gandhi"],
        correctAnswer: 1,
        order: 2
      },
      {
        questionText: "Which planet is known as the 'Red Planet'?",
        options: ["Jupiter", "Venus", "Mars", "Saturn"],
        correctAnswer: 2,
        order: 3
      }
    ];

    const seedBtn = document.getElementById('seed-btn');
    const logEl = document.getElementById('log');

    function log(msg, type = '') {
      const span = document.createElement('span');
      if (type) span.className = type;
      span.textContent = msg + '\n';
      logEl.appendChild(span);
      logEl.scrollTop = logEl.scrollHeight;
    }

    seedBtn.addEventListener('click', async () => {
      seedBtn.disabled = true;
      seedBtn.textContent = 'Uploading…';
      logEl.innerHTML = '';

      log('Starting Firestore seed…', 'info');

      try {
        const questionsRef = collection(db, 'questions');

        for (let i = 0; i < questions.length; i++) {
          const docId = `q${i + 1}`;
          await setDoc(doc(questionsRef, docId), questions[i]);
          log(`✓ Uploaded question ${i + 1}: "${questions[i].questionText}"`, 'success');
        }

        log('');
        log('✅ All questions uploaded successfully!', 'success');
        log('You can now close this page and delete firestore-seed.html.', 'info');
        seedBtn.textContent = 'Done ✓';
      } catch (error) {
        log(`✗ Error: ${error.message}`, 'error');
        log('Check your Firestore rules and try again.', 'error');
        seedBtn.textContent = 'Retry Upload';
        seedBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
