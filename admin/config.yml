backend:
  name: git-gateway
  branch: main # Branch to update (optional; defaults to master)

media_folder: "images" # Media files will be stored in the repo under images/
public_folder: "/images" # The src attribute for uploaded media will begin with /images/

collections:
  - name: "jobs_data"
    label: "Data Files"
    files:
      - label: "Government Jobs"
        name: "jobs"
        file: "data/jobs.json"
        fields:
          - name: "items"
            label: "Jobs List"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "number"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Badge", name: "badge", widget: "select", options: ["new", "hot"]}
              - {label: "Category", name: "category", widget: "string"}
              - {label: "Date", name: "date", widget: "date", format: "YYYY-MM-DD"}
              - {label: "Number of Posts", name: "posts", widget: "string", required: false}
              - {label: "Tag", name: "tag", widget: "string"}

      - label: "Admit Cards"
        name: "admit"
        file: "data/admit.json"
        fields:
          - name: "items"
            label: "Admit Cards List"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "number"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Badge", name: "badge", widget: "hidden", default: "admit"}
              - {label: "Category", name: "category", widget: "string"}
              - {label: "Date", name: "date", widget: "date", format: "YYYY-MM-DD"}
              - {label: "Number of Posts", name: "posts", widget: "hidden", default: "", required: false}
              - {label: "Tag", name: "tag", widget: "string"}

      - label: "Results"
        name: "result"
        file: "data/result.json"
        fields:
          - name: "items"
            label: "Results List"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "number"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Badge", name: "badge", widget: "hidden", default: "result"}
              - {label: "Category", name: "category", widget: "string"}
              - {label: "Date", name: "date", widget: "date", format: "YYYY-MM-DD"}
              - {label: "Number of Posts", name: "posts", widget: "hidden", default: "", required: false}
              - {label: "Tag", name: "tag", widget: "string"}

      - label: "Scholarships"
        name: "scholarship"
        file: "data/scholarship.json"
        fields:
          - name: "items"
            label: "Scholarships List"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "number"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Badge", name: "badge", widget: "hidden", default: "scholarship"}
              - {label: "Category", name: "category", widget: "string"}
              - {label: "Date", name: "date", widget: "date", format: "YYYY-MM-DD"}
              - {label: "Number of Posts", name: "posts", widget: "hidden", default: "", required: false}
              - {label: "Tag", name: "tag", widget: "string"}
