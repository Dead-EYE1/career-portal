<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003580"/>
      <stop offset="100%" style="stop-color:#e63946"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Subtle white diagonal shine in top-right -->
  <polygon points="320,0 512,0 512,190" fill="rgba(255,255,255,0.07)"/>
  <!-- "N" letter -->
  <text
    x="68"
    y="360"
    font-family="'Poppins', 'Inter', Arial, sans-serif"
    font-weight="900"
    font-size="280"
    fill="white"
    letter-spacing="-8"
  >NJ</text>
  <!-- Bottom accent bar -->
  <rect x="68" y="420" width="376" height="16" rx="8" fill="rgba(255,255,255,0.25)"/>
</svg>
